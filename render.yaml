services:
  - type: web
    name: aether-web-agent
    runtime: docker
    plan: free
    envVars:
      - key: PORT
        value: 3001
      - key: HEADLESS
        value: "true"
      - key: OLLAMA_URL
        value: "https://ollama.com"
      - key: OLLAMA_MODEL
        value: "gpt-oss:120b-cloud"
      - key: OLLAMA_API_KEY
        sync: false

